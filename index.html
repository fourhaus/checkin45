<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex, nofollow">
    <title>Check-in Instructions</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Splash Screen -->
    <div class="logo-splash-container">
        <img src="images/FourHaus.png" alt="Logo" class="logo-splash">
    </div>

    <!-- Header -->
    <header class="app-header">
        <div class="header-content">
            <div class="logo-left">
                <img src="images/FourHaus.png" alt="Company Logo" class="logo">
            </div>
            <div class="topic-nav-inline">
                <div class="topic-tabs" id="topicTabs">
                    <!-- Tabs will be generated dynamically -->
                </div>
            </div>
        </div>
    </header>

    <!-- Step Navigation -->
    <div class="step-nav" id="stepNav">
        <button class="step-btn" id="prevBtn" onclick="prevStep()">
            <i class="bi bi-chevron-left"></i>
        </button>
        <div class="step-text" id="stepText">
            <strong>Loading...</strong>
            <br>Please wait...
        </div>
        <button class="step-btn" id="nextBtn" onclick="nextStep()">
            <i class="bi bi-chevron-right"></i>
        </button>
    </div>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Content Container -->
    <main id="content"></main>

    <!-- Image Modal -->
    <div class="image-modal" id="imageModal">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <img id="modalImg" src="" alt="Enlarged view">
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
